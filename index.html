<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weston's Galaxy Site</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: black;
      font-family: 'Poppins', sans-serif;
      color: white;
    }

    /* ✨ Animated Galaxy Background */
    canvas#stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: radial-gradient(ellipse at bottom, #090a0f 0%, #000000 100%);
    }

    /* 🌌 Glowing Header */
    h1 {
      position: absolute;
      top: 30px;
      width: 100%;
      text-align: center;
      font-size: 2.5em;
      letter-spacing: 2px;
      color: #bb86fc;
      text-shadow: 0 0 15px #bb86fc, 0 0 25px #7b2cbf;
      z-index: 2;
    }

    /* 🎮 Game Frame */
    iframe {
      position: absolute;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 80%;
      border: 3px solid #7b2cbf;
      border-radius: 20px;
      box-shadow: 0 0 25px #7b2cbf, 0 0 40px #4b0082;
      z-index: 2;
    }

    /* 🧠 Credit */
    .footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 1em;
      color: #bb86fc;
      text-shadow: 0 0 10px #bb86fc;
      z-index: 2;
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <h1>Weston's Galaxy</h1>

  <!-- 1v1.lol embed -->
  <iframe src="https://1v1.lol" title="1v1.lol"></iframe>

  <div class="footer">Made by Weston 💫</div>

  <script>
    // 🌠 Moving Stars Background
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];
    const numStars = 200;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    for (let i = 0; i < numStars; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.5,
        speed: Math.random() * 0.5 + 0.2
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      for (let star of stars) {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
        star.y += star.speed;
        if (star.y > canvas.height) star.y = 0;
      }
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
